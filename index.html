function showGameOver(){
  if(!S.gameOver)return;
  const g=S.gameOver;const winner=g.winner;
  const el=$('gameOverOverlay');if(!el)return;
  const scores=Object.entries(g.scores||{}).sort(([,a],[,b])=>a-b);
  const isChamp=!!(S.tournament&&S.game&&S.game.partyChamp);
  if(isChamp&&S.tournament){
    const placements=scores.map(([pid])=>g.players.find(p=>p.id===pid)).filter(Boolean);
    placements.forEach((p,i)=>{
      let pts=i===0?100:i===1?75:i===2?60:i===3?50:i<10?25:5;
      S.tournament.standings[p.name]=(S.tournament.standings[p.name]||0)+pts;
    });
  }
  const isFinalRound=isChamp&&S.tournament&&S.tournament.round>=S.tournament.bestOf;
  const sortedTourney=isChamp&&S.tournament?Object.entries(S.tournament.standings).sort(([,a],[,b])=>b-a):[];
  const tourneyWinner=isFinalRound&&sortedTourney.length>0?sortedTourney[0][0]:null;
  el.innerHTML='<div class="go-overlay" role="dialog" aria-modal="true"><div class="go-modal">'
    +(!isFinalRound?'':'<div class="go-title" style="font-size:clamp(20px,4vw,36px);color:var(--gold);text-shadow:0 0 40px var(--gold-glow)">🏆 TOURNAMENT OVER! 🏆</div>')
    +(!isFinalRound?'<div class="go-title">Game Over!</div>':'')
    +(winner&&!isFinalRound?'<span class="go-crown">👑</span><span class="go-winner">'+escHtml(winner.name)+'</span><span class="go-sub">Last Hand Standing!</span>':'')
    +(tourneyWinner&&isFinalRound?'<span class="go-crown">🏆</span><span class="go-winner" style="font-size:clamp(24px,4vw,42px)">'+escHtml(tourneyWinner)+'</span><span class="go-sub">Party Pool Champion!</span>':'')
    +(isChamp&&S.tournament?'<div class="go-scores" style="margin-top:12px"><h3>Tournament Standings (Round '+S.tournament.round+'/'+S.tournament.bestOf+')</h3>'+sortedTourney.map(([name,pts],i)=>'<div class="score-row"><span>'+(i<3?['🥇','🥈','🥉'][i]:'#'+(i+1))+' '+escHtml(name)+'</span><span class="score-val">'+pts+' pts</span></div>').join('')+'</div>':'')
    +(!isChamp?'<div class="go-scores" style="margin-top:16px"><h3>Final Scores</h3>'+scores.map(([pid,score])=>{const p=g.players.find(pl=>pl.id===pid);return '<div class="score-row"><span>'+(p?escHtml(p.name):'Unknown')+'</span><span class="score-val">'+score+' pts</span></div>'}).join('')+'</div>':'')
    +(isChamp&&!isFinalRound&&S.partyHost?'<button class="modal-btn" onclick="nextPartyRound()">▶ Next Round ('+(S.tournament.round+1)+'/'+S.tournament.bestOf+')</button>':'')
    +(isFinalRound||!isChamp?'<button class="modal-btn" onclick="backToMenu()">Back to Menu</button>':'')
    +'</div></div>';
  const active=g.players.filter(p=>!p.isOut).length;
  if(winner&&active<=1&&!isChamp)showToast('🏆 '+winner.name+' is the Last Hand Standing Champion!','gold',5000);
  if(S._partyInterval){clearInterval(S._partyInterval);S._partyInterval=null}
  if(S.partyChannel)S.partyChannel.postMessage({type:'game_finished',roomCode:S.roomCode,gameState:g});
}
function nextPartyRound(){
  if(!S.partyHost||!S.tournament)return;
  S.tournament.round++;
  S.gameOver=null;S.game=null;
  closeModal('gameOverOverlay');
  if(document.querySelector('.go-overlay'))document.querySelector('.go-overlay').remove();
  startPartyGame();
}

// ---------- HALL OF CHAMPIONS ----------
function renderHall(){
  const champs=loadChampions().reverse();
  app.innerHTML='<div class="main-menu"><div class="menu-bg"></div><div class="menu-content">'
    +'<div class="menu-title"><h1 class="game-title" style="font-size:clamp(14px,2.5vw,22px)"><span class="title-line">👑 HALL OF</span><span class="title-line accent">CHAMPIONS</span></h1></div>'
    +(champs.length===0?'<p style="color:var(--text2);margin:20px 0">No champions yet. Play a match to become the first!</p>'
      :'<div class="hall-list">'+champs.slice(0,50).map((c,i)=>'<div class="hall-entry"><span class="rank-num">#'+(i+1)+'</span><span class="champ-name">'+escHtml(c.name)+'</span><span class="champ-stat">'+c.playerCount+'p · '+c.difficulty+' · '+c.score+'pts</span></div>').join('')+'</div>')
    +'<div style="margin-top:20px"><button class="modal-btn" onclick="backToMenu()">Back to Menu</button></div>'
    +'</div></div>';
}

// ---------- STANDINGS ----------
function renderStandings(){
  const st=loadStandings();
  const sorted=Object.entries(st).sort(([,a],[,b])=>b.points-a.points||b.wins-a.wins);
  app.innerHTML='<div class="main-menu"><div class="menu-bg"></div><div class="menu-content">'
    +'<div class="menu-title"><h1 class="game-title" style="font-size:clamp(14px,2.5vw,22px)"><span class="title-line">📊 CHAMPIONSHIP</span><span class="title-line accent">STANDINGS</span></h1></div>'
    +(sorted.length===0?'<p style="color:var(--text2);margin:20px 0">No standings yet.</p>'
      :'<table class="standings-table"><thead><tr><th>#</th><th>Player</th><th>W</th><th>G</th><th>Pts</th><th>Best</th></tr></thead><tbody>'
      +sorted.slice(0,30).map(([name,s],i)=>'<tr class="pos'+(i+1)+'"><td class="rank">'+(i<3?['🥇','🥈','🥉'][i]:'#'+(i+1))+'</td><td>'+escHtml(name)+'</td><td><span class="winner-badge">'+s.wins+'</span></td><td>'+s.games+'</td><td>'+s.points+'</td><td>'+s.bestScore+'</td></tr>').join('')
      +'</tbody></table>')
    +'<div style="margin-top:20px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center">'
    +'<button class="modal-btn" style="flex:1;min-width:120px" onclick="backToMenu()">Back</button>'
    +'<button class="modal-btn" style="flex:1;min-width:120px;background:rgba(231,76,60,.3)" onclick="saveStandings({});showToast(\'Standings cleared\',\'warn\');render()">Clear</button>'
    +'</div></div></div>';
}

// ---------- FINISH ----------
function finishGame(){
  S.gameOver=S.game;showGameOver();
  if(S.game)showToast('🏆 '+S.game.winner?.name+' wins!','gold',5000);
  if(S._partyInterval){clearInterval(S._partyInterval);S._partyInterval=null}
  if(S.partyChannel)S.partyChannel.postMessage({type:'game_finished',roomCode:S.roomCode,gameState:S.game});
}

// ---------- SIMULATION UI ----------
function renderSim(){
  app.innerHTML='<div class="sim-mode" role="main" aria-label="AI Royale"><div class="sim-header"><div class="sim-title">🎬 AI Royale — '+S.selCount+' Players</div>'
    +'<div class="sim-controls">'+[1,2,4].map(s=>'<button class="speed-btn'+(S.speed===s?' active':'')+'" onclick="changeSpeed('+s+')">'+s+'×</button>').join('')
    +'</div><button class="header-btn" onclick="backToMenu()">✕ Leave</button></div>'
    +'<div class="sim-body" id="simBody"><div class="sim-center" id="simCenter">'
    +'<div class="sim-discard" id="simDiscard"></div>'
    +'<div class="sim-info" id="simDeckInfo">🃏 0 cards remaining</div>'
    +'<div class="sim-action" id="simAction">Waiting...</div>'
    +'<div class="sim-thinking-text hidden" id="simThinking">🤖 Thinking...</div>'
    +'<div class="sim-turn-text" id="simTurn">Turn: —</div>'
    +'</div><div class="sim-sidebar" id="simSidebar"></div></div><div id="simGameOver"></div></div>';
  if(!S.game)startSimulation();else updateSimUI();
}
function updateSimUI(){
  const g=S.game;if(!g)return;
  const top=getTopCard(g);
  const disc=$('simDiscard');if(disc)disc.innerHTML=top?renderCardHTML(top,false):'<div class="hand-cards empty">No cards</div>';
  const di=$('simDeckInfo');if(di)di.textContent='🃏 '+g.deck.length+' cards remaining';
  const act=$('simAction');if(act)act.textContent=g.lastAction||'Waiting...';
  const th=$('simThinking');
  if(th){if(S.botThinking){th.textContent='🎙️ '+S.botThinking.botName+' is thinking...';th.classList.remove('hidden')}else th.classList.add('hidden')}
  const tn=$('simTurn');
  if(tn){const cp=getCurrentPlayer(g);tn.innerHTML='Turn: <strong>'+(cp?escHtml(cp.name):'—')+'</strong>'}
  const sb=$('simSidebar');
  if(sb){
    const lb=getLeaderboard(g);
    const sorted=[...lb].sort((a,b)=>{if(a.isOut&&b.isOut)return 0;if(a.isOut)return 1;if(b.isOut)return -1;return a.cards-b.cards});
    const leader=sorted[0];
    const danger=getDangerPlayers(g);
    sb.innerHTML='<div class="sim-cam"><h3>👁️ AI Royale Cam</h3><div class="cam-target">Leader: <strong>'+(leader?escHtml(leader.name):'—')+'</strong> ('+(leader?leader.cards+' cards':'—')+')</div>'
      +(danger.length>0?'<div style="margin-top:6px;color:var(--danger);font-size:var(--font-xs)">⚠️ Danger Zone: '+danger.map(d=>escHtml(d.name)).join(', ')+'</div>':'')
      +'<div style="margin-top:4px;color:var(--text2);font-size:var(--font-xs)">Remaining: '+g.players.filter(p=>!p.isOut).length+'/'+g.playerCount+'</div>'
      +'</div>'+renderLeaderboardHTML(lb,false);
  }
}
function changeSpeed(speed){S.speed=speed;document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active'));const btns=document.querySelectorAll('.speed-btn');const idx=speed===1?0:speed===2?1:2;if(btns[idx])btns[idx].classList.add('active')}

// ---------- PARTICLE SYSTEM ----------
let particles=[];
function initParticles(){
  const c=document.getElementById('particleCanvas');
  if(!c)return;
  const ctx=c.getContext('2d');
  let w=c.width=window.innerWidth;
  let h=c.height=window.innerHeight;
  const count=Math.min(60,Math.floor(w*h/15000));
  particles=Array.from({length:count},()=>({
    x:Math.random()*w,y:Math.random()*h,
    vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,
    r:Math.random()*2+1,o:Math.random()*.4+.1
  }));
  function draw(){
    ctx.clearRect(0,0,w,h);
    for(const p of particles){
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=w;if(p.x>w)p.x=0;
      if(p.y<0)p.y=h;if(p.y>h)p.y=0;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,107,53,${p.o})`;ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',()=>{w=c.width=window.innerWidth;h=c.height=window.innerHeight});
  draw();
}
function backToMenu(){
  if(S.game&&S.game._botTimeout){clearTimeout(S.game._botTimeout);S.game._botTimeout=null}
  if(S._partyInterval){clearInterval(S._partyInterval);S._partyInterval=null}
  if(S.partyChannel){try{S.partyChannel.close()}catch(e){};S.partyChannel=null}
  if(S.online)disconnectFromServer();
  S.game=null;S.screen='menu';S.gameOver=null;S.botThinking=null;S.showLB=false;S.colorPicker=null;
  S.isPractice=false;S.isSimulation=false;S.isChampionship=false;S.isParty=false;S.speed=1;
  S.roomCode=null;S.partyHost=false;S.partyPlayers=[];S.online=false;S.onlineMyId=null;S.onlinePlayers=[];S.roomHost=false;S.tournament=null;
  render();
}

// =============================================
// SECTION 10: RESIZE & EVENTS
// =============================================

let resizeTimer=null;
window.addEventListener('resize',()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(()=>{detectDevice();if(S.screen==='game')updateGameUI();else if(S.screen==='simulation')updateSimUI()},150)});
window.addEventListener('orientationchange',()=>{setTimeout(()=>{detectDevice();if(S.screen==='game')updateGameUI();else if(S.screen==='simulation')updateSimUI()},300)});
document.addEventListener('keydown',(e)=>{
  if(e.key==='Escape'){
    if(S.screen==='game'&&S.showLB){S.showLB=false;updateGameUI();return}
    if(S.screen==='game'&&S.colorPicker){S.colorPicker=null;updateGameUI();return}
    if(S.gameOver){S.gameOver=null;if(S.screen==='game')updateGameUI();return}
  }
});

_expose.forEach(fn=>{if(typeof window[fn]==='undefined'&&eval('typeof '+fn)!=='undefined')window[fn]=eval(fn)});

render();
updateDebug();
initParticles();
document.getElementById('statusBar').textContent='🟢';
